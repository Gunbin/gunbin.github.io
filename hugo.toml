baseurl = "https://gunbin.github.io/"
metaDataFormat = "yaml"
title = "TrendRadar Insights"
theme = "blist"

enableRobotsTXT = true
DefaultContentLanguage = "ko"
DefaultContentLanguageInSubdir = true
[languages]
  [languages.ko]
    contentDir = "content/ko" # Korean
    weight = 1
    languageName = "한국어"
    title = "TrendRadar Insights (KR)"
    [languages.ko.params]
      introTitle = "Today's Trends, Tomorrow's Insights"
      introSubtitle = "데이터로 세상을 읽고, 가장 빠른 트렌드를 분석합니다."
      introPhoto = "/KR_thumb.png"
      # logo = "/logo.png"
    [[languages.ko.menu.main]]
        name = "Home"
        url = "/"
        weight = 1
    [[languages.ko.menu.main]]
        name = "Tech and IT"
        url = "categories/tech-and-it/"
        weight = 2
    [[languages.ko.menu.main]]
        name = "Finance"
        url = "categories/finance/"
        weight = 3
    [[languages.ko.menu.main]]
        name = "Life and Health"
        url = "categories/life-and-health/"
        weight = 4
    [[languages.ko.menu.main]]
        name = "Entertainment"
        url = "categories/entertainment/"
        weight = 5

  [languages.en]
    contentDir = "content/en" # English
    weight = 2
    languageName = "English"
    title = "TrendRadar Insights (US)"
    [languages.en.params]
      introTitle = "Today's Trends, Tomorrow's Insights"
      introSubtitle = "Reading the world with data and analyzing the fastest trends."
      introPhoto = "/US_thumb.png"
      # logo = "/logo.png"
    [[languages.en.menu.main]]
        name = "Home"
        url = "/en/"
        weight = 1
    [[languages.en.menu.main]]
        name = "Tech and IT"
        url = "categories/tech-and-it/"
        weight = 2
    [[languages.en.menu.main]]
        name = "Finance"
        url = "categories/finance/"
        weight = 3
    [[languages.en.menu.main]]
        name = "Life and Health"
        url = "categories/life-and-health/"
        weight = 4
    [[languages.en.menu.main]]
        name = "Entertainment"
        url = "categories/entertainment/"
        weight = 5

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  # SEO & Search Engine Verification
  # 발급받은 코드가 있다면 아래 "" 사이에 넣어주세요.
  googleSiteVerification = ""
  naverSiteVerification = ""
  bingSiteVerification = ""

  # Enable the darkmode toggle in header
  darkModeToggle = true

  # Enable search in header
  enableSearch = true

  # Option to customize the search parameters of a page
  # Below are the supported options; Note that including entire content
  # may slowdown the loading of search results
  # Title of page is included by default
  searchKeys = [
    "tags",
    "date",
    "categories",
    "summary",
    "content",
    "link",
    "author"
  ]

  # Custom copyright - optional
  copyright = "Copyright © 2026 - TrendRadar · All rights reserved"
  favicon = "/swirl.png"

  # Color for the intro details and social links block, not applicable for dark mode
  # Supported values: Any color from TailwindCSS default colors
  # Reference: https://tailwindcss.com/docs/customizing-colors
  ascentColor = "bg-zinc-50"

  # The page bundle that is shown on the front page
  frontBundle = "blog"

  # Used to hide the post metadata such as posted date, reading time and word count
  # Can be used at site level or page level
  hideMeta = false

  # To hide "Other languages" option if the post is available in multiple languages
  # Can be used at site level or page level
  hideOtherLanguages = false

  # Add support for Table of contents
  # Can be added to a page level also in markdown frontmatter
  toc = true

  # Hides the thumbnail in post view
  # Thumbnails in home and blog pages will still be shown
  # This setting can also be in page's markdown file
  hidePageThumbnail = false

# Comments system
[params.comments]
  # Supports disqus, giscus and utterances
  # Check hugo docs for setting up disqus
  system = "giscus"

  # Options for giscus, exclude hyphens
  repo = "gunbin/gunbin.github.io"
  repoid = ""
  category = "Announcements"
  categoryid = ""
  mapping = "pathname"
  strict = "0"
  reactionsenabled = "1"
  emitmetadata = "0"
  inputposition = "top"
  theme = "preferred_color_scheme"
  lang = "ko"

[params.homepage.social]
  # Global params common for both languages
  title = "Connect with TrendRadar"
  description = "Stay ahead of the curve with real-time trend analysis and deep-dive insights. | 실시간 트렌드 분석과 깊이 있는 인사이트로 세상의 흐름을 먼저 읽으세요."

  [[params.homepage.social.icons]]
    website = "github"
    url = "https://github.com/gunbin"
  [[params.homepage.social.icons]]
    website = "x"
    url = "https://x.com/"

[build]
  writeStats = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

# syntax highlight settings
[markup]
  [markup.highlight]
    style = "dracula"
  [markup.goldmark.renderer]
    # Enable to include inline HTML
    unsafe = true
  [markup.goldmark.extensions]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)']]
